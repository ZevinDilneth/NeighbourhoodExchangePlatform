



jicofo {
    
    authentication {
      enabled = true
      // The type of authentication. Supported values are XMPP or JWT.
      
      type = JWT
      
      login-url = "meet.jitsi"
      enable-auto-login = true
      authentication-lifetime = 24 hours
    }
    

    // Configuration related to jitsi-videobridge
    bridge {
      

      

      

      
      
      

      

      
      brewery-jid = "JvbBrewery@internal.meet.jitsi"
      

      
    }
    // Configure the codecs and RTP extensions to be used in the offer sent to clients.
    codec {
      video {
        
        
        
        
      }
      audio {
        
      }
    }

    conference {
      
      enable-auto-owner = false
      

      

      

      

      

      

      

      

      

    }

    

    
    jibri {
      brewery-jid = "JibriBrewery@internal.meet.jitsi"
      
      pending-timeout = "90"
    }
    

    

    

    octo {
      // Whether or not to use Octo. Note that when enabled, its use will be determined by
      // $jicofo.bridge.selection-strategy. There's a corresponding flag in the JVB and these
      // two MUST be in sync (otherwise bridges will crash because they won't know how to
      // deal with octo channels).
      enabled = false
    }

    

    sctp {
      enabled = false
    }

    xmpp {
      
      client {
        enabled = true
        hostname = "prosody"
        port = "5222"
        domain = "auth.meet.jitsi"
        xmpp-domain = "meet.jitsi"
        username = "focus"
        password = "8c4c41c1f11aa3f3785638f75a3587cd"
        conference-muc-jid = "conference.meet.jitsi"
        client-proxy = "focus.meet.jitsi"
        disable-certificate-verification = true
      }
      
      
      trusted-domains = [ "recorder.meet.jitsi" ]
      
    }
}
